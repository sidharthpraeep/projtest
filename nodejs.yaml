apiVersion: apps/v1
kind: Deployment
metadata:
  name: docknode
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node.js
  template:
    metadata:
      labels:
        app: node.js
    spec:
      imagePullSecrets:
        - name: myregistrykey
      containers:
        - name: dockenode
          image: sidh2004/dockernode:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: NodePort   
  selector:
    app: node.js
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30007

